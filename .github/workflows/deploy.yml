name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1071580099653/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@project-e8696948-4169-4dc3-902.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t us-central1-docker.pkg.dev/project-e8696948-4169-4dc3-902/cloud-run-source-deploy/betzone:${{ github.sha }} \
                       -t us-central1-docker.pkg.dev/project-e8696948-4169-4dc3-902/cloud-run-source-deploy/betzone:latest .

      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/project-e8696948-4169-4dc3-902/cloud-run-source-deploy/betzone:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/project-e8696948-4169-4dc3-902/cloud-run-source-deploy/betzone:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy betzone \
            --image=us-central1-docker.pkg.dev/project-e8696948-4169-4dc3-902/cloud-run-source-deploy/betzone:${{ github.sha }} \
            --project=project-e8696948-4169-4dc3-902 \
            --region=us-central1 \
            --platform=managed \
            --quiet
