openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Betting platform API + Ride hailing API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: matches
    description: Match operations
  - name: bets
    description: Betting operations
  - name: users
    description: User management
  - name: admin
    description: Admin operations
  - name: rides
    description: Ride hailing operations
  - name: driver
    description: Driver operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List all matches
      responses:
        "200":
          description: List of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"
    post:
      operationId: createMatch
      tags: [matches, admin]
      summary: Create a new match (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMatchBody"
      responses:
        "201":
          description: Created match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /matches/{matchId}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get a single match with betting info
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /matches/{matchId}/result:
    patch:
      operationId: setMatchResult
      tags: [matches, admin]
      summary: Set match result (admin only)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMatchResultBody"
      responses:
        "200":
          description: Updated match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bets:
    get:
      operationId: listMyBets
      tags: [bets]
      summary: List current user bets
      responses:
        "200":
          description: List of user bets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bet"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: placeBet
      tags: [bets]
      summary: Place a bet on a match
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceBetBody"
      responses:
        "201":
          description: Placed bet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin, users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{userId}/approve:
    patch:
      operationId: approveUser
      tags: [admin, users]
      summary: Approve a user (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{userId}/reject:
    patch:
      operationId: rejectUser
      tags: [admin, users]
      summary: Reject a user (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide stats (admin only)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Ride Hailing ───────────────────────────────────────────

  /rides:
    post:
      operationId: requestRide
      tags: [rides]
      summary: Request a new ride (rider)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestRideBody"
      responses:
        "201":
          description: Ride created and queued for drivers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides/active:
    get:
      operationId: getActiveRide
      tags: [rides]
      summary: Get the current active ride for the authenticated user (as rider or driver)
      responses:
        "200":
          description: Active ride or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveRideResponse"

  /rides/history:
    get:
      operationId: listRideHistory
      tags: [rides]
      summary: Get past completed/cancelled rides for the authenticated user
      responses:
        "200":
          description: List of past rides
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RideWithDetails"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides/{rideId}/cancel:
    post:
      operationId: cancelRide
      tags: [rides]
      summary: Cancel a ride (rider or driver)
      parameters:
        - name: rideId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ride cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "400":
          description: Cannot cancel in this state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides/{rideId}/accept:
    post:
      operationId: acceptRide
      tags: [rides, driver]
      summary: Driver accepts a pending ride
      parameters:
        - name: rideId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ride accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "400":
          description: Already accepted or driver busy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides/{rideId}/start:
    post:
      operationId: startRide
      tags: [rides, driver]
      summary: Driver marks ride as started (picked up rider)
      parameters:
        - name: rideId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ride started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "400":
          description: Ride not in accepted state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides/{rideId}/complete:
    post:
      operationId: completeRide
      tags: [rides, driver]
      summary: Driver marks ride as completed
      parameters:
        - name: rideId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ride completed with fare
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "400":
          description: Ride not in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides/{rideId}/rate:
    post:
      operationId: rateRide
      tags: [rides]
      summary: Rider rates a completed ride
      parameters:
        - name: rideId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateRideBody"
      responses:
        "200":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "400":
          description: Already rated or not completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Driver ─────────────────────────────────────────────────

  /driver/profile:
    get:
      operationId: getDriverProfile
      tags: [driver]
      summary: Get the current user's driver profile
      responses:
        "200":
          description: Driver profile or null if not a driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverProfileResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /driver/register:
    post:
      operationId: registerAsDriver
      tags: [driver]
      summary: Register the current user as a driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDriverBody"
      responses:
        "201":
          description: Driver profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverProfile"
        "400":
          description: Already registered as driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /driver/availability:
    patch:
      operationId: updateDriverAvailability
      tags: [driver]
      summary: Toggle driver online/offline status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvailabilityBody"
      responses:
        "200":
          description: Updated driver profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Driver profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /driver/location:
    patch:
      operationId: updateDriverLocation
      tags: [driver]
      summary: Update driver GPS location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLocationBody"
      responses:
        "200":
          description: Location updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /driver/pending-rides:
    get:
      operationId: listPendingRides
      tags: [driver]
      summary: List pending ride requests available for a driver to accept
      responses:
        "200":
          description: List of pending rides
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RideWithDetails"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GetCurrentAuthUserResponse:
      type: object
      properties:
        isAuthenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - isAuthenticated

    AuthUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        profileImage:
          type: string
        isAdmin:
          type: boolean
        status:
          type: string
          enum: [pending, approved, rejected]
      required:
        - id
        - isAdmin
        - status

    Match:
      type: object
      properties:
        id:
          type: integer
        team1:
          type: string
        team2:
          type: string
        matchDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [upcoming, live, finished]
        winner:
          type: string
          nullable: true
        totalBetsTeam1:
          type: number
        totalBetsTeam2:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - team1
        - team2
        - matchDate
        - status
        - totalBetsTeam1
        - totalBetsTeam2
        - createdAt

    MatchDetail:
      allOf:
        - $ref: "#/components/schemas/Match"
        - type: object
          properties:
            myBet:
              $ref: "#/components/schemas/Bet"
              nullable: true

    CreateMatchBody:
      type: object
      properties:
        team1:
          type: string
        team2:
          type: string
        matchDate:
          type: string
          format: date-time
      required:
        - team1
        - team2
        - matchDate

    SetMatchResultBody:
      type: object
      properties:
        winner:
          type: string
          nullable: true
        status:
          type: string
          enum: [upcoming, live, finished]
      required:
        - status

    Bet:
      type: object
      properties:
        id:
          type: integer
        matchId:
          type: integer
        userId:
          type: string
        team:
          type: string
        amount:
          type: number
        payout:
          type: number
          nullable: true
        status:
          type: string
          enum: [pending, won, lost]
        createdAt:
          type: string
          format: date-time
        match:
          $ref: "#/components/schemas/Match"
      required:
        - id
        - matchId
        - userId
        - team
        - amount
        - status
        - createdAt

    PlaceBetBody:
      type: object
      properties:
        matchId:
          type: integer
        team:
          type: string
        amount:
          type: number
          minimum: 1
      required:
        - matchId
        - team
        - amount

    UserWithStats:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        profileImage:
          type: string
        isAdmin:
          type: boolean
        status:
          type: string
          enum: [pending, approved, rejected]
        totalBetAmount:
          type: number
        totalBets:
          type: integer
        totalWon:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - isAdmin
        - status
        - totalBetAmount
        - totalBets
        - totalWon
        - createdAt

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        pendingUsers:
          type: integer
        totalBetAmount:
          type: number
        totalMatches:
          type: integer
        activeMatches:
          type: integer
      required:
        - totalUsers
        - pendingUsers
        - totalBetAmount
        - totalMatches
        - activeMatches

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ─── Ride Hailing Schemas ────────────────────────────────────

    ActiveRideResponse:
      type: object
      properties:
        ride:
          $ref: "#/components/schemas/RideWithDetails"
          nullable: true
      required:
        - ride

    DriverProfileResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/DriverProfile"
          nullable: true
      required:
        - profile

    Ride:
      type: object
      properties:
        id:
          type: string
        riderId:
          type: string
        driverId:
          type: string
          nullable: true
        status:
          type: string
          enum: [requested, accepted, in_progress, completed, cancelled]
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        pickupLat:
          type: number
        pickupLng:
          type: number
        dropoffLat:
          type: number
        dropoffLng:
          type: number
        fare:
          type: number
          nullable: true
        riderRating:
          type: integer
          nullable: true
        requestedAt:
          type: string
          format: date-time
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - riderId
        - status
        - pickupAddress
        - dropoffAddress
        - pickupLat
        - pickupLng
        - dropoffLat
        - dropoffLng
        - requestedAt

    RideWithDetails:
      allOf:
        - $ref: "#/components/schemas/Ride"
        - type: object
          properties:
            rider:
              type: object
              properties:
                id:
                  type: string
                username:
                  type: string
                profileImageUrl:
                  type: string
                  nullable: true
              required:
                - id
            driver:
              type: object
              nullable: true
              properties:
                id:
                  type: string
                username:
                  type: string
                profileImageUrl:
                  type: string
                  nullable: true
                vehicle:
                  type: string
                  nullable: true
                licensePlate:
                  type: string
                  nullable: true
                rating:
                  type: number
                  nullable: true
                currentLat:
                  type: number
                  nullable: true
                currentLng:
                  type: number
                  nullable: true
              required:
                - id

    DriverProfile:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        username:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
        vehicle:
          type: string
          nullable: true
        licensePlate:
          type: string
          nullable: true
        isAvailable:
          type: boolean
        currentLat:
          type: number
          nullable: true
        currentLng:
          type: number
          nullable: true
        rating:
          type: number
          nullable: true
        totalRides:
          type: integer
        totalEarnings:
          type: number
      required:
        - id
        - userId
        - isAvailable
        - totalRides
        - totalEarnings

    RequestRideBody:
      type: object
      properties:
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        pickupLat:
          type: number
        pickupLng:
          type: number
        dropoffLat:
          type: number
        dropoffLng:
          type: number
      required:
        - pickupAddress
        - dropoffAddress
        - pickupLat
        - pickupLng
        - dropoffLat
        - dropoffLng

    RateRideBody:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
      required:
        - rating

    RegisterDriverBody:
      type: object
      properties:
        vehicle:
          type: string
        licensePlate:
          type: string
      required:
        - vehicle
        - licensePlate

    UpdateAvailabilityBody:
      type: object
      properties:
        isAvailable:
          type: boolean
      required:
        - isAvailable

    UpdateLocationBody:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
      required:
        - lat
        - lng
